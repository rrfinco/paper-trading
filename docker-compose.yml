version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    networks:
      - trading_network

  nginx:
    image: nginx:alpine
    container_name: trading_nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - trading_network

  mysql:
    image: mysql:8.0
    platform: linux/amd64
    container_name: trading_mysql
    restart: unless-stopped
    ports:
      - "3313:3306"
    environment:
      MYSQL_DATABASE: trading_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: trading_user
      MYSQL_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - trading_network

  phpmyadmin:
    image: phpmyadmin:latest
    platform: linux/amd64
    container_name: trading_phpmyadmin
    restart: unless-stopped
    ports:
      - "8091:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - trading_network

networks:
  trading_network:

volumes:
  mysql_data:
